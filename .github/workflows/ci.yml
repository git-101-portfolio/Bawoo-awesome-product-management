name: CI

# PR(Pull Request)이 생성되거나 코드가 업데이트될 때 자동으로 실행됩니다.
on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # 검사가 실행될 가상 환경 (우분투 최신 버전)
    runs-on: ubuntu-latest

    steps:
    # 1. 현재 PR에 올라온 코드를 가상 환경으로 가져옵니다.
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. PR Checks가 정상적으로 작동하는지 확인하기 위한 테스트 스크립트입니다.
    - name: Run a welcome script
      run: echo "PR Checks가 성공적으로 실행되었습니다! 실습 통과!"